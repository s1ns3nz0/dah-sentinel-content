id: 00000000-0000-0000-0000-000000000000
name: TemplateScheduledRule
displayName: "[TEMPLATE] Scheduled rule template"
description: |
  설명을 채울 곳. 어떤 위협을 탐지하는지, 어떤 신호가 트리거인지, false positive 가능성.
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: CustomLogsAma
    dataTypes:
      - UAVTelemetry_CL
queryFrequency: 5m
queryPeriod: 15m
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
techniques:
  - T1190
relevantTechniques:
  - T1190
tags:
  - dah
  - uav
  - template
query: |
  UAVTelemetry_CL
  | where TimeGenerated > ago(15m)
  | where MsgType == "EKF_STATUS_REPORT"
  | where PosHorizVariance > 0.5
  | extend HostCustomEntity = UAVId
  | project TimeGenerated, UAVId, PosHorizVariance, VelocityVariance, HostCustomEntity
suppressionEnabled: false
suppressionDuration: PT5M
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: PT5H
    matchingMethod: AllEntities
    groupByEntities: []
    groupByAlertDetails: []
    groupByCustomDetails: []
eventGroupingSettings:
  aggregationKind: SingleAlert
alertDetailsOverride: {}
customDetails: {}
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: HostCustomEntity
version: 1.0.0
kind: Scheduled
